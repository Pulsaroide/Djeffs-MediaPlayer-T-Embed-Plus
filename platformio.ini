; ============================================================
;  Djeff's MediaPlayer — T-Embed CC1101
;  PlatformIO configuration
; ============================================================

[env:T-Embed-CC1101]
platform      = espressif32@6.5.0
board         = esp32-s3-devkitm-1
framework     = arduino

; ── Build flags ─────────────────────────────────────────────
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    ; TFT_eSPI : utiliser le fichier de config LilyGO T-Embed
    -DUSER_SETUP_LOADED=1
    -DSETUP_FILE="Setup214_LilyGo_T_Embed_PN532.h"

; ── Upload ──────────────────────────────────────────────────
upload_speed        = 921600
monitor_speed       = 115200
upload_protocol     = esptool

; ── Partition : 16MB Flash, PSRAM OPI activée ───────────────
board_build.flash_mode        = qio
board_build.flash_size        = 16MB
board_build.partitions        = default_16MB.csv
board_upload.flash_size       = 16MB
board_build.arduino.memory_type = qio_opi   ; active OPI PSRAM 8MB

; ── Librairies ──────────────────────────────────────────────
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bodmer/TJpg_Decoder@^1.0.8         ; FIX: décodeur MJPEG correct
    greiman/SdFat@^2.2.2
    bblanchon/ArduinoJson@^7.0.0
    mathertel/RotaryEncoder@^1.5.3     ; FIX: lib officielle LilyGO (≠ ESP32Encoder)
    ; ESP32Encoder retiré — incompatible T-Embed et non officiel
