; ============================================================
;  Djeff's MediaPlayer For T-Embed Plus
;  PlatformIO Configuration
; ============================================================
[env:T-Embed-CC1101]
platform                  = espressif32@6.5.0
board                     = esp32-s3-devkitm-1
framework                 = arduino

; ── CPU & Flash ──────────────────────────────────────────────
board_build.mcu           = esp32s3
board_build.f_cpu         = 240000000L
board_build.flash_size    = 16MB
board_build.flash_mode    = dio
board_build.psram_type    = opi
board_upload.flash_size   = 16MB
board_upload.maximum_size = 16777216

; ── Partitions ───────────────────────────────────────────────
board_build.partitions    = partitions_16MB.csv

; ── Build flags ──────────────────────────────────────────────
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    ; ── Fix: bloquer conflit FS.h/SdFat ──
    -DFS_NO_GLOBALS
    -Wno-cpp
    ; ── TFT_eSPI config ──
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=170
    -DTFT_HEIGHT=320
    -DTFT_CS=41
    -DTFT_DC=16
    -DTFT_RST=40
    -DTFT_MOSI=9
    -DTFT_SCLK=11
    -DTFT_BL=21
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DGFXFF=1
    -DSPI_FREQUENCY=80000000
    ; ── SD Card ──
    -DSD_CS=10
    -DSD_MOSI=11
    -DSD_MISO=13
    -DSD_SCLK=12
    ; ── I2S Audio ──
    -DI2S_BCLK=46
    -DI2S_LRCLK=40
    -DI2S_DIN=7
    ; ── Encoder ──
    -DENCODER_INA=4
    -DENCODER_INB=5
    -DENCODER_KEY=0
    -DUSER_KEY=6

; ── Libraries ────────────────────────────────────────────────
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    greiman/SdFat@^2.2.2
    bblanchon/ArduinoJson@^7.0.0
    ESP32Encoder
    bitbank2/JPEGDEC@^1.2.8
    mathertel/RotaryEncoder@^1.5.3

monitor_speed             = 115200
monitor_filters           = esp32_exception_decoder
upload_speed              = 921600
